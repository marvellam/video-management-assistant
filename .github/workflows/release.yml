name: Build desktop releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      CARGO_BUILD_JOBS: "4"
      CARGO_INCREMENTAL: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend checks
        run: npm run typecheck

      - name: Rust checks
        shell: pwsh
        run: |
          cargo fmt --manifest-path .\src-tauri\Cargo.toml -- --check
          cargo test --manifest-path .\src-tauri\Cargo.toml -j 4
          cargo clippy --manifest-path .\src-tauri\Cargo.toml --all-targets -j 4 -- -D warnings

      - name: Build Windows portable EXE
        run: npm run tauri -- build --no-bundle

      - name: Stage Windows release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item .\src-tauri\target\release\video-management-assistant.exe .\release\Video-Management-Assistant.exe

      - uses: actions/upload-artifact@v4
        with:
          name: video-management-assistant-windows-x64
          path: release/Video-Management-Assistant.exe

  macos:
    runs-on: macos-latest
    env:
      CARGO_BUILD_JOBS: "4"
      CARGO_INCREMENTAL: "0"
      VITE_TARGET_PLATFORM: "macos"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          shared-key: macos-universal

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend checks
        run: npm run typecheck

      - name: Rust checks
        run: |
          cargo fmt --manifest-path ./src-tauri/Cargo.toml -- --check
          cargo test --manifest-path ./src-tauri/Cargo.toml -j 4
          cargo clippy --manifest-path ./src-tauri/Cargo.toml --all-targets -j 4 -- -D warnings

      - name: Build universal macOS app
        run: npm run tauri -- build --target universal-apple-darwin --bundles app

      - name: Verify and stage macOS release
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find ./src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          EXECUTABLE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Contents/Info.plist")"
          ARCHS="$(lipo -archs "$APP_PATH/Contents/MacOS/$EXECUTABLE_NAME")"
          echo "$ARCHS" | grep -q 'arm64'
          echo "$ARCHS" | grep -q 'x86_64'
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" release/Video-Management-Assistant-macOS-universal.zip

      - uses: actions/upload-artifact@v4
        with:
          name: video-management-assistant-macos-universal
          path: release/Video-Management-Assistant-macOS-universal.zip

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release
          sha256sum Video-Management-Assistant.exe Video-Management-Assistant-macOS-universal.zip > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
